<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>blublu.nails</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6">

    <div class="max-w-5xl mx-auto">
        <h1 class="text-3xl font-bold mb-8 text-center">Catálogo de Produtos</h1>

        <div id="vitrine" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white p-4 rounded-lg shadow">
                <img src="https://via.placeholder.com/300" class="w-full h-48 object-cover rounded">
                <h2 class="mt-4 font-bold">Produto Exemplo A</h2>
                <p class="text-blue-600">R$ 89,90</p>
                <button onclick="adicionarAoCarrinho('Produto A', 89.90, 0.5, 15, 15, 15)" class="mt-4 w-full bg-black text-white py-2 rounded">Adicionar</button>
            </div>
            </div>

            <div id="vitrine" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white p-4 rounded-lg shadow">
                <img src="https://via.placeholder.com/300" class="w-full h-48 object-cover rounded">
                <h2 class="mt-4 font-bold">Produto Exemplo B</h2>
                <p class="text-blue-600">R$ 89,90</p>
                <button onclick="adicionarAoCarrinho('Produto A', 89.90, 0.5, 15, 15, 15)" class="mt-4 w-full bg-black text-white py-2 rounded">Adicionar</button>
            </div>
            </div>

        <div class="mt-12 bg-white p-6 rounded-lg shadow-lg border">
            <h2 class="text-xl font-bold mb-4">Seu Carrinho</h2>
            <div id="lista-carrinho" class="mb-4 text-gray-600 italic">Carrinho vazio...</div>
            
            <div class="border-t pt-4">
                <label class="block mb-2">Calcular Frete (CEP):</label>
                <div class="flex gap-2">
                    <input type="text" id="cep" placeholder="00000-000" class="border p-2 rounded w-full">
                    <button onclick="calcularFrete()" class="bg-green-600 text-white px-4 py-2 rounded">Calcular</button>
                </div>
            </div>
            <div id="resultado-frete" class="mt-4 font-semibold text-green-700"></div>
        </div>
    </div>

    <script>
        let carrinho = [];

        function adicionarAoCarrinho(nome, preco, peso, a, l, c) {
            carrinho.push({ name: nome, price: preco, weight: peso, height: a, width: l, length: c, quantity: 1 });
            atualizarCarrinho();
        }

        function atualizarCarrinho() {
            const lista = document.getElementById('lista-carrinho');
            lista.innerHTML = carrinho.map(i => `<div>${i.name} - R$ ${i.price}</div>`).join('');
        }

        async function calcularFrete() {
            const cep = document.getElementById('cep').value;
            const resDiv = document.getElementById('resultado-frete');
            resDiv.innerText = "Calculando...";

            const response = await fetch('https://blublu-nails.onrender.com', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ cepDestino: cep, produtos: carrinho })
            });

            const dados = await response.json();

// Verificamos se 'dados' é uma lista. Se não for, tentamos acessar a propriedade correta.
const opcoes = Array.isArray(dados) ? dados : (dados.options || []);

if (opcoes.length === 0) {
    resDiv.innerText = "Nenhuma opção de frete encontrada.";
    return;
}

resDiv.innerHTML = opcoes.map(servico => 
    `<div class="p-2 border-b">
        <span class="font-bold">${servico.name}:</span> 
        R$ ${servico.price} (${servico.delivery_time} dias)
    </div>`
).join('');
        }
    </script>
</body>
</html>
