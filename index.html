<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>blublu.nails - Catálogo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .frete-selecionado { border-color: #059669 !important; background-color: #f0fdf4; }
    </style>
</head>
<body class="bg-gray-50 p-6">

    <div class="max-w-5xl mx-auto">
        <h1 class="text-3xl font-bold mb-8 text-center text-gray-800 underline decoration-pink-500">Catálogo de Produtos</h1>

        <div id="vitrine" class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
            
            <div class="bg-white p-4 rounded-lg shadow border">
                <img src="https://via.placeholder.com/300" class="w-full h-48 object-cover rounded">
                <h2 class="mt-4 font-bold text-gray-700">Produto Exemplo A</h2>
                <p class="text-blue-600 font-semibold">R$ 89,90</p>
                <button onclick="adicionarAoCarrinho('Produto A', 89.90)" 
                        class="mt-4 w-full bg-black text-white py-2 rounded hover:bg-gray-800 transition">
                    Adicionar
                </button>
            </div>

            <div class="bg-white p-4 rounded-lg shadow border">
                <img src="https://via.placeholder.com/300" class="w-full h-48 object-cover rounded">
                <h2 class="mt-4 font-bold text-gray-700">Produto Exemplo B</h2>
                <p class="text-blue-600 font-semibold">R$ 45,00</p>
                <button onclick="adicionarAoCarrinho('Produto B', 45.00)" 
                        class="mt-4 w-full bg-black text-white py-2 rounded hover:bg-gray-800 transition">
                    Adicionar
                </button>
            </div>

        </div>

        <div class="mt-12 bg-white p-6 rounded-lg shadow-lg border max-w-2xl mx-auto">
            <h2 class="text-xl font-bold mb-4 flex items-center gap-2">🛒 Seu Carrinho</h2>
            
            <div id="lista-carrinho" class="mb-4 text-gray-600 italic border-b pb-4">
                Carrinho vazio...
            </div>

            <div class="flex justify-between items-center mb-6 font-bold text-lg text-gray-800">
                <span>Subtotal Itens:</span>
                <span id="subtotal-produtos">R$ 0,00</span>
            </div>
            
            <div class="border-t pt-4">
                <label class="block mb-2 font-medium">Calcular Frete (CEP):</label>
                <div class="flex gap-2">
                    <input type="text" id="cep" placeholder="00000-000" class="border p-2 rounded w-full outline-none focus:ring-2 focus:ring-blue-400">
                    <button onclick="calcularFrete()" class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700 transition">Calcular</button>
                </div>
            </div>

            <div id="resultado-frete" class="mt-4 space-y-2 text-sm text-gray-700"></div>

            <div id="area-finalizar" class="hidden mt-8 border-t pt-6">
                <div class="flex justify-between items-center mb-4 text-xl font-bold text-green-700">
                    <span>TOTAL GERAL:</span>
                    <span id="total-geral">R$ 0,00</span>
                </div>
                <button onclick="enviarPedido()" class="w-full bg-green-600 text-white font-bold py-4 rounded-lg shadow hover:bg-green-700 transition flex justify-center items-center gap-2">
                    Finalizar Pedido via WhatsApp
                </button>
            </div>
        </div>
    </div>

    <script>
        let carrinho = [];
        let freteEscolhido = null;
        const WHATSAPP_LOJA = "5581983115644"; // <-- COLOQUE SEU NÚMERO AQUI

        function adicionarAoCarrinho(nome, preco) {
            carrinho.push({ name: nome, price: preco });
            freteEscolhido = null; // Reseta se mudar o carrinho
            document.getElementById('area-finalizar').classList.add('hidden');
            atualizarCarrinho();
        }

        function atualizarCarrinho() {
            const lista = document.getElementById('lista-carrinho');
            const subtotalText = document.getElementById('subtotal-produtos');
            
            if (carrinho.length === 0) {
                lista.innerHTML = "Carrinho vazio...";
                subtotalText.innerText = "R$ 0,00";
                return;
            }

            const subtotal = carrinho.reduce((sum, i) => sum + i.price, 0);
            lista.innerHTML = carrinho.map(i => `
                <div class="flex justify-between py-1 border-b border-gray-50 italic">
                    <span>• ${i.name}</span>
                    <span>R$ ${i.price.toFixed(2)}</span>
                </div>
            `).join('');

            subtotalText.innerText = `R$ ${subtotal.toFixed(2)}`;
            document.getElementById('resultado-frete').innerHTML = ""; 
        }

        async function calcularFrete() {
            const cep = document.getElementById('cep').value.replace(/\D/g, '');
            const resDiv = document.getElementById('resultado-frete');
            
            if (carrinho.length === 0) return alert("Adicione produtos primeiro!");
            if (cep.length !== 8) return alert("CEP inválido!");

            resDiv.innerHTML = "<p class='animate-pulse text-blue-600'>Buscando preços...</p>";

            try {
                const response = await fetch('https://blublu-nails.onrender.com/calcular-frete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cepDestino: cep, produtos: carrinho })
                });

                const dados = await response.json();
                const opcoes = Array.isArray(dados) ? dados : (dados.options || []);

                resDiv.innerHTML = opcoes.map(s => `
                    <div onclick="selecionarFrete(this, '${s.name}', ${s.price})" 
                         class="p-3 border rounded cursor-pointer flex justify-between items-center hover:bg-gray-50 transition">
                        <div>
                            <span class="font-bold">${s.name}</span>
                            <p class="text-xs text-gray-500">${s.delivery_time} dias úteis</p>
                        </div>
                        <span class="font-bold">R$ ${parseFloat(s.price).toFixed(2)}</span>
                    </div>
                `).join('');

            } catch (error) {
                resDiv.innerHTML = "<p class='text-red-500'>Erro ao calcular. Tente novamente.</p>";
            }
        }

        function selecionarFrete(elemento, nome, valor) {
            freteEscolhido = { nome, valor };

            // Remove destaque de todos e adiciona no clicado
            document.querySelectorAll('#resultado-frete div').forEach(d => d.classList.remove('frete-selecionado', 'border-green-600'));
            elemento.classList.add('frete-selecionado', 'border-green-600');

            // Calcula Total Geral
            const subtotal = carrinho.reduce((sum, i) => sum + i.price, 0);
            const total = subtotal + valor;

            document.getElementById('total-geral').innerText = `R$ ${total.toFixed(2)}`;
            document.getElementById('area-finalizar').classList.remove('hidden');
        }

        function enviarPedido() {
            const subtotal = carrinho.reduce((sum, i) => sum + i.price, 0);
            const total = subtotal + freteEscolhido.valor;
            const cep = document.getElementById('cep').value;

            let texto = `*NOVO PEDIDO - blublu.nails*\n\n`;
            texto += `*Itens:*\n`;
            carrinho.forEach(i => texto += `• ${i.name}: R$ ${i.price.toFixed(2)}\n`);
            texto += `\n*Entrega:* ${freteEscolhido.nome} (R$ ${freteEscolhido.valor.toFixed(2)})`;
            texto += `\n*CEP:* ${cep}`;
            texto += `\n\n*TOTAL: R$ ${total.toFixed(2)}*`;

            window.open(`https://api.whatsapp.com/send?phone=${&text=${encodeURIComponent(texto)}`, '_blank');
        }
    </script>
</body>
</html>
