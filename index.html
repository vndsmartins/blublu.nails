<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>blublu.nails - Loja Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <h1 class="text-3xl font-bold mb-8 text-center text-gray-800 underline decoration-pink-500 italic">blublu.nails</h1>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
            
            <div class="bg-white p-4 rounded-lg shadow border">
                <img src="imagens/BTS_Foto.jpeg" class="w-full h-49 object-cover rounded" alt="Produto A">
                <h2 class="mt-4 font-bold text-gray-700">Unha BTS com fotinha (consultar idol disponível) </h2>
                <p class="text-pink-600 font-bold text-xl">R$ 90,00</p>
                <button onclick="adicionarAoCarrinho('Unha BTS com fotinha (consultar idol disponível) ', 90.00)" 
                        class="mt-4 w-full bg-black text-white py-2 rounded hover:bg-pink-600 transition duration-300">
                    ADICIONAR
                </button>
            </div>

            <div class="bg-white p-4 rounded-lg shadow border">
                <img src="imagens/arirang.jpeg" class="w-full h-49 object-cover rounded" alt="Produto B">
                <h2 class="mt-4 font-bold text-gray-700">Unha BTS Arirang </h2>
                <p class="text-pink-600 font-bold text-xl">R$ 80,00</p>
                <button onclick="adicionarAoCarrinho('Unha BTS Arirang ', 80.00)" 
                        class="mt-4 w-full bg-black text-white py-2 rounded hover:bg-pink-600 transition duration-300">
                    ADICIONAR
                </button>
            </div>
               <div class="bg-white p-4 rounded-lg shadow border">
                <img src="imagens/pedraria.jpeg" class="w-full h-49 object-cover rounded" alt="Produto B">
                <h2 class="mt-4 font-bold text-gray-700">Unhas pedrarias</h2>
                <p class="text-pink-600 font-bold text-xl">R$ 90,00</p>
                <button onclick="adicionarAoCarrinho('Unhas pedrarias', 90.00)" 
                        class="mt-4 w-full bg-black text-white py-2 rounded hover:bg-pink-600 transition duration-300">
                    ADICIONAR
                </button>
            </div>
               <div class="bg-white p-4 rounded-lg shadow border">
                <img src="imagens/longas.jpeg" class="w-full h-49 object-cover rounded" alt="Produto B">
                <h2 class="mt-4 font-bold text-gray-700">Unhas longas + charms</h2>
                <p class="text-pink-600 font-bold text-xl">R$ 90,00</p>
                <button onclick="adicionarAoCarrinho('Unhas longas + charms', 90.00)" 
                        class="mt-4 w-full bg-black text-white py-2 rounded hover:bg-pink-600 transition duration-300">
                    ADICIONAR
                </button>
            </div>

        </div>

        <div class="mt-12 bg-white p-6 rounded-2xl shadow-xl border-t-4 border-pink-400 max-w-2xl mx-auto">
            <h2 class="text-2xl font-bold mb-6 flex items-center gap-2">🛒 Resumo do Pedido</h2>
            
            <div id="lista-carrinho" class="mb-4 text-gray-500 italic border-b pb-4 space-y-2">
                O carrinho está vazio...
            </div>

            <div class="flex justify-between items-center mb-8 font-bold text-xl text-gray-800">
                <span>Subtotal Itens:</span>
                <span id="subtotal-produtos" class="text-pink-600">R$ 0,00</span>
            </div>
            
            <div class="bg-gray-50 p-4 rounded-xl border mb-6">
                <label class="block mb-2 font-semibold text-gray-700">Calcular Frete (CEP):</label>
                <div class="flex gap-2">
                    <input type="text" id="cep" placeholder="00000-000" maxlength="9"
                           class="border p-3 rounded-lg w-full focus:ring-2 focus:ring-pink-300 outline-none shadow-sm">
                    <button onclick="calcularFrete()" id="btn-calc" 
                            class="bg-gray-800 text-white px-6 py-2 rounded-lg hover:bg-black transition font-bold">
                        CALCULAR
                    </button>
                </div>
                <div id="resultado-frete" class="mt-4 space-y-2"></div>
            </div>

            <div id="area-finalizar" class="hidden border-t-2 border-dashed pt-6 mt-6">
                <div class="flex justify-between items-center mb-6 text-2xl font-black text-green-700">
                    <span>TOTAL:</span>
                    <span id="total-geral">R$ 0,00</span>
                </div>
                <button onclick="enviarPedido()" 
                        class="w-full bg-green-500 text-white font-extrabold py-5 rounded-2xl shadow-lg hover:bg-green-600 transition-all flex justify-center items-center gap-3 text-lg uppercase">
                    <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" class="w-6 h-6 invert">
                    Enviar pedido agora
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
