<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>blublu.nails - Finalizar Pedido</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .frete-card.selected { border-color: #ec4899; background-color: #fdf2f8; }
    </style>
</head>
<body class="bg-gray-50 p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold mb-8 text-center text-pink-600">Catálogo blublu.nails</h1>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            
            <div class="space-y-4">
                <h2 class="text-xl font-semibold mb-4 text-gray-700">Produtos Disponíveis</h2>
                
                <div class="bg-white p-4 rounded-xl shadow-sm border flex items-center gap-4">
                    <img src="https://via.placeholder.com/80" class="rounded-lg">
                    <div class="flex-1">
                        <h3 class="font-bold text-gray-800">Kit Unhas Gel</h3>
                        <p class="text-pink-600 font-bold text-lg">R$ 89,90</p>
                    </div>
                    <button onclick="adicionarAoCarrinho('Kit Unhas Gel', 89.90)" 
                            class="bg-pink-500 text-white px-4 py-2 rounded-lg hover:bg-pink-600 transition">
                        + Add
                    </button>
                </div>

                <div class="bg-white p-4 rounded-xl shadow-sm border flex items-center gap-4">
                    <img src="https://via.placeholder.com/80" class="rounded-lg">
                    <div class="flex-1">
                        <h3 class="font-bold text-gray-800">Esmalte Especial</h3>
                        <p class="text-pink-600 font-bold text-lg">R$ 29,90</p>
                    </div>
                    <button onclick="adicionarAoCarrinho('Esmalte Especial', 29.90)" 
                            class="bg-pink-500 text-white px-4 py-2 rounded-lg hover:bg-pink-600 transition">
                        + Add
                    </button>
                </div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-lg border h-fit sticky top-8">
                <h2 class="text-2xl font-bold mb-6 flex items-center gap-2">🛒 Seu Pedido</h2>
                
                <div id="lista-carrinho" class="space-y-3 mb-6 min-h-[50px] text-gray-500 italic">
                    Carrinho vazio...
                </div>

                <div class="border-t pt-4 mb-6">
                    <div class="flex justify-between text-lg font-bold text-gray-800">
                        <span>Subtotal:</span>
                        <span id="subtotal-valor text-pink-600">R$ 0,00</span>
                    </div>
                </div>

                <div class="space-y-3">
                    <label class="block text-sm font-medium text-gray-700">Informe seu CEP para entrega:</label>
                    <div class="flex gap-2">
                        <input type="text" id="cep" placeholder="00000-000" maxlength="9"
                               class="border border-gray-300 p-2 rounded-lg w-full outline-none focus:ring-2 focus:ring-pink-300">
                        <button onclick="calcularFrete()" id="btn-calcular"
                                class="bg-gray-800 text-white px-4 py-2 rounded-lg hover:bg-black transition">
                            Calcular
                        </button>
                    </div>
                    <div id="resultado-frete" class="space-y-2 mt-4"></div>
                </div>

                <button onclick="enviarPedido()" id="btn-finalizar" 
                        class="hidden mt-8 w-full bg-green-500 hover:bg-green-600 text-white font-bold py-4 rounded-xl shadow-lg flex items-center justify-center gap-2 transition-all transform hover:scale-105">
                    <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" class="w-6 h-6 invert">
                    Finalizar via WhatsApp
                </button>
            </div>
        </div>
    </div>

    <script>
        let carrinho = [];
        let freteSelecionado = null;
        const MEU_WHATSAPP = "5511999999999"; // <--- COLOQUE SEU NÚMERO AQUI (DDI + DDD + Numero)

        function adicionarAoCarrinho(nome, preco) {
            carrinho.push({ name: nome, price: preco, quantity: 1 });
            freteSelecionado = null; // Reseta o frete se mudar o carrinho
            document.getElementById('btn-finalizar').classList.add('hidden');
            atualizarCarrinho();
        }

        function atualizarCarrinho() {
            const lista = document.getElementById('lista-carrinho');
            const subtotalText = document.getElementById('subtotal-valor');
            const resFrete = document.getElementById('resultado-frete');

            if (carrinho.length === 0) {
                lista.innerHTML = "Carrinho vazio...";
                subtotalText.innerText = "R$ 0,00";
                return;
            }

            const totalProd = carrinho.reduce((sum, item) => sum + item.price, 0);
            
            lista.innerHTML = carrinho.map((item, index) => `
                <div class="flex justify-between items-center text-gray-700 bg-gray-50 p-2 rounded">
                    <span>${item.name}</span>
                    <span class="font-bold">R$ ${item.price.toFixed(2)}</span>
                </div>
            `).join('');

            subtotalText.innerText = `R$ ${totalProd.toFixed(2)}`;
            resFrete.innerHTML = ""; // Limpa opções de frete antigas
        }

        async function calcularFrete() {
            const cep = document.getElementById('cep').value.replace(/\D/g, '');
            const resDiv = document.getElementById('resultado-frete');
            const btn = document.getElementById('btn-calcular');

            if (carrinho.length === 0) return alert("Adicione produtos primeiro!");
            if (cep.length !== 8) return alert("CEP inválido!");

            resDiv.innerHTML = `<p class="text-sm text-blue-500 animate-pulse text-center">Calculando melhores rotas...</p>`;
            btn.disabled = true;

            try {
                const response = await fetch('https://blublu-nails.onrender.com/calcular-frete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cepDestino: cep, produtos: carrinho })
                });

                const dados = await response.json();
                const opcoes = Array.isArray(dados) ? dados : (dados.options || []);

                resDiv.innerHTML = opcoes.map(servico => `
                    <div onclick="selecionarFrete('${servico.name}', ${servico.price})" 
                         class="frete-card p-3 border-2 rounded-xl flex justify-between items-center cursor-pointer transition hover:border-pink-300 bg-white">
                        <div>
                            <span class="font-bold text-gray-800">${servico.name}</span>
                            <p class="text-xs text-gray-500">${servico.delivery_time} dias úteis</p>
                        </div>
                        <span class="font-bold text-green-600 text-lg">R$ ${parseFloat(servico.price).toFixed(2)}</span>
                    </div>
                `).join('');

            } catch (error) {
                resDiv.innerHTML = `<p class="text-red-500 text-sm">Erro ao calcular. Tente novamente.</p>`;
            } finally {
                btn.disabled = false;
            }
        }

        function selecionarFrete(nome, valor) {
            freteSelecionado = { nome, valor };
            
            // Estilizar o card selecionado
            document.querySelectorAll('.frete-card').forEach(card => {
                card.classList.remove('border-pink-500', 'bg-pink-50');
                if(card.innerText.includes(nome)) card.classList.add('border-pink-500', 'bg-pink-50');
            });

            const totalProd = carrinho.reduce((sum, item) => sum + item.price, 0);
            const totalGeral = totalProd + valor;
            
            const btnFinalizar = document.getElementById('btn-finalizar');
            btnFinalizar.classList.remove('hidden');
            btnFinalizar.innerHTML = `🛒 Finalizar Pedido - Total: R$ ${totalGeral.toFixed(2)}`;
        }

        function enviarPedido() {
            const subtotal = carrinho.reduce((sum, item) => sum + item.price, 0);
            const totalGeral = subtotal + freteSelecionado.valor;
            const cep = document.getElementById('cep').value;

            let texto = `*Novo Pedido - blublu.nails*\n\n`;
            texto += `*Itens:*\n`;
            carrinho.forEach(i => texto += `• ${i.name} - R$ ${i.price.toFixed(2)}\n`);
            
            texto += `\n*Frete:* ${freteSelecionado.nome} - R$ ${freteSelecionado.valor.toFixed(2)}\n`;
            texto += `*CEP:* ${cep}\n`;
            texto += `\n*TOTAL A PAGAR: R$ ${totalGeral.toFixed(2)}*\n\n`;
            texto += `_Por favor, me envie os dados para pagamento!_`;

            const url = `https://api.whatsapp.com/send?phone=${MEU_WHATSAPP}&text=${encodeURIComponent(texto)}`;
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
